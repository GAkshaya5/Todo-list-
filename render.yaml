services:
  - type: web
    name: assignment-7-server
    env: node
    plan: free
    repo: "https://github.com/<your-username>/<your-repo>" # REPLACE with your repo URL
    branch: main
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
